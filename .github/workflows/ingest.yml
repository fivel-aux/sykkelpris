name: Ingest

on:
  # Daily at 03:00 UTC — runs outside Vercel's function timeout limits
  schedule:
    - cron: "0 3 * * *"
  # Allow manual trigger from the GitHub Actions UI (useful for testing)
  workflow_dispatch:
    inputs:
      store:
        description: "Store slug to ingest (leave blank for all active stores)"
        required: false
        default: ""

jobs:
  ingest:
    name: Run ingestion pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Run ingestion
        run: |
          STORE="${{ github.event.inputs.store }}"
          if [ -n "$STORE" ]; then
            echo "Running ingestion for store: $STORE"
            npm run ingest -- "$STORE"
          else
            echo "Running ingestion for all active stores"
            npm run ingest
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
